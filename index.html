<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="./libs/highlight.js/atom-one-dark.min.css">
  <script src="./libs/highlight.js/highlight.min.js"></script>
  <link rel="icon" type="image/png" href="./favicon.png">
  <script src="./libs/highlight.js/languages/lua.min.js"></script>
  <script>
    // register lua syntax
    if (typeof window.hljsDefineLua === 'function') {
      hljs.registerLanguage('lua', window.hljsDefineLua);
    }
    hljs.configure({ ignoreUnescapedHTML: true });
    hljs.highlightAll();

  </script>
  <!-- <link rel="icon" type="image/png" href="favicon.png"> -->
  <meta charset="UTF-8">
  <title>JokerBlocks</title>
  <style>
      html, body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: sans-serif;
      }
      #tabBar {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 36px;
        z-index: 6;
        display: flex;
        align-items: center;
        background: #e8e8e8;
        border-bottom: 2px solid #ccc;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        scrollbar-width: thin;
        scrollbar-color: #aaa transparent;
        padding: 0 4px;
        gap: 3px;
        flex-shrink: 0;
      }
      #tabBar::-webkit-scrollbar { height: 4px; }
      #tabBar::-webkit-scrollbar-thumb { background: #aaa; border-radius: 4px; }

      .tab-item {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        border-radius: 5px 5px 0 0;
        background: #d0d0d0;
        border: 1px solid #bbb;
        border-bottom: none;
        cursor: pointer;
        font-size: 13px;
        min-width: 60px;
        max-width: 160px;
        user-select: none;
        flex-shrink: 0;
        transition: background 0.15s;
      }
      .tab-item:hover { background: #c0c0c0; }
      .tab-item.active {
        background: #fff;
        border-color: #aaa;
        font-weight: bold;
        color: #1a73e8;
      }
      .tab-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .tab-close {
        font-size: 14px;
        line-height: 1;
        color: #888;
        padding: 0 2px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .tab-close:hover { color: #e53935; background: rgba(229,57,53,0.1); }
      #addTabBtn {
        flex-shrink: 0;
        background: #2196F3;
        color: white;
        border: none;
        border-radius: 5px;
        padding: 4px 10px;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        margin-left: 4px;
      }
      #addTabBtn:hover { background: #1565c0; }

      #blocklyDiv {
        position: absolute;
        top: 36px;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: calc(100% - 36px);
        z-index: 0;
      }

      /* Dark mode tab styles */
      body.dark #tabBar { background: #1a1a1a; border-bottom-color: #444; }
      body.dark .tab-item { background: #2a2a2a; border-color: #444; color: #ccc; }
      body.dark .tab-item:hover { background: #333; }
      body.dark .tab-item.active { background: #121212; color: #64b5f6; border-color: #555; }
      body.dark #addTabBtn { background: #444; }
      body.dark #addTabBtn:hover { background: #555; }
      #liveLuaArea {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 10px;
        border-radius: 5px;
        font-size: 12px;
        line-height: 1.5;
        overflow-y: auto;
        max-height: 100%;
        font-family: 'Monaco', 'Courier New', monospace;
      }

      #liveLuaArea code {
        display: block;
        white-space: pre;
      }

      /* Highlight.js color overrides for dark theme */
      .hljs {
        background: #1e1e1e !important;
        color: #d4d4d4;
      }

      .hljs-string { color: #ce9178; }
      .hljs-number { color: #b5cea8; }
      .hljs-literal { color: #569cd6; }
      .hljs-function { color: #dcdcaa; }
      .hljs-keyword { color: #569cd6; }
      .hljs-comment { color: #6a9955; }
      .hljs-selected {
        background: #444 !important;
        display: inline-block;
        width: 100%;
      }

      .blocklySvg {
        font-family: 'Poppins', monospace !important;
        font-size: 14px !important;
      }

      .blocklyText {
        fill: #000000; 
      }      


      #optionsBtn {
          position: absolute;
          top: 41px;
          right: 5px;
          z-index: 20;
          padding: 12px 20px; 
          font-size: 16px;    
          background: #2196F3;
          color: #fff;
          border: none;
          border-radius: 5px;
          cursor: pointer;
      }

      #optionsMenu {
          display: none;
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: #222;
          color: #fff;
          padding: 20px;
          border-radius: 10px;
          box-shadow: 0 0 15px rgba(0,0,0,0.5);
          z-index: 50;
          min-width: 300px;
      }

      #closeOptions {
        position: absolute;
        top: 5px;
        right: 5px;
        background: #f44336;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 3px;
      }
      
      body.dark {
        background: #121212;
        color: #eee;
      }

      body.dark #optionsMenu {
        background: #333;
        color: #fff;
      }

      body.dark #blocklyDiv {
        background: #1a1a1a;
      }

      body.dark #optionsBtn {
        background: #444;
        color: #fff;
      }

      body.dark #liveLuaArea {
        background: #0f0f0f;
        border-left: 2px solid #333;
      }

      body.dark input,
      body.dark textarea,
      body.dark select {
        background: #222;
        color: #fff;
        border: 1px solid #444;
      }

  </style>
</head>
<body>
  <div id="tabBar"></div>
  <div id="blocklyDiv"></div>

  <button id="optionsBtn">= Options</button>

  <!-- Options Menu -->
  <div id="optionsMenu">
    <button id="closeOptions">X</button>
    
    <h3>Options</h3>

  <div style="margin-bottom:10px;">
    <label>Project Name:</label><br>
    <input type="text" id="projectNameField" value="MyMod" style="width:100%;">
  </div>
  <div style="margin-bottom:10px;">
    <label>Author(s):</label><br>
    <input type="text" id="projectAuthorField" value="YourName" style="width:100%;">
  </div>
  <div style="margin-bottom:10px;">
    <label>Description:</label><br>
    <textarea id="projectDescField" style="width:100%;height:60px;">My awesome mod</textarea>
  </div>


    
  <button id="manageVarsBtn">Manage Variables</button>

  <!-- Variable Manager Popup -->
  <div id="varManager" style="
    display:none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #222;
    color: #fff;
    padding: 20px;
    border-radius: 10px;
    z-index: 100;
    width: 300px;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
  ">
    <button id="closeVarManager" style="
      position:absolute;
      top:5px;
      right:5px;
      background:#f44336;
      border:none;
      color:white;
      padding:4px 8px;
      border-radius:3px;
      cursor:pointer;
    ">X</button>

    <h3 style="margin-top:0;">Variable Manager</h3>
    <div id="varList" style="max-height:200px;overflow-y:auto;margin-bottom:10px;"></div>

    <input type="text" id="newVarName" placeholder="New variable name" style="width:100%;padding:5px;border:none;border-radius:4px;margin-bottom:8px;">
    <button id="addVarBtn" style="width:100%;background:#4caf50;color:white;border:none;border-radius:4px;padding:6px;cursor:pointer;">
      + Add Variable
    </button>
  </div>

    <button id="exportModBtn">Export Mod</button>

    <button id="newProjectBtn">New Project</button>
    
    <button id="saveProjectBtn">Save Project</button>
    <button id="loadProjectBtn">Load Project</button>

    <button id="testBlockBtn">Test Custom Block</button>
    
    <button id="clearAllDataBtn" style="margin-top:10px;width:100%;background:#cc3333;color:white;border:none;border-radius:5px;padding:8px;cursor:pointer;font-weight:bold;">
      Clear All Data
    </button>

    <div style="margin-top:10px;">
      <label>Default Variable Scope:</label><br>
      <select id="defaultVarScopeSelect" style="width:100%;padding:5px;border:none;border-radius:4px;margin-top:5px;">
        <option value="global">Global</option>
        <option value="local">Local</option>
      </select>
    </div>  
    
    <div style="margin-top:10px;">
      <label>
        <input type="checkbox" id="darkModeToggle"> Dark Mode
      </label>
    </div>

    <div style="margin-top:10px;">
      <label>
        <input type="checkbox" id="liveLuaToggle"> Live Lua Preview
      </label>
    </div>

  </div>

  <xml id="toolbox" style="display:none"></xml>
  
  <pre id="liveLuaArea"
      style="display:none;
              position:absolute;
              top:36px;
              right:0;
              width:400px;
              height:calc(100% - 36px);
              background:#111;
              margin:0;
              padding:10px;
              overflow:auto;
              font-family:monospace;
              border-left:2px solid #333;
              z-index:10;">
  <code class="language-lua"></code>              
  </pre>

  <script src="./libs/jszip.min.js"></script>
  <script src="./blockly/blockly.min.js"></script>
  <script src="./scripts/block_defs.js"></script>
  <script src="./scripts/blocks.js"></script>
  <script src="./scripts/generators.js"></script>
  <script src="./scripts/main.js"></script>
</body>
</html>
